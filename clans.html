<title>Clans</title>

<link rel="stylesheet" href="style.css">

<style>
.clan-container {
    padding: 40px 20px;
    text-align: center;
}

.clan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.clan-card {
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.clan-card:hover {
    transform: translateY(-8px);
}

.clan-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.clan-card h3 {
    padding: 15px;
}
</style>

</head>
