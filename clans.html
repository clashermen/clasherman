<style>
/* PAGE */
.clan-container {
    padding: 50px 40px;
    text-align: center;
    font-family: 'Poppins', sans-serif;
}

/* HEADING */
.clan-container h1 {
    font-size: 42px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
}

.clan-container h1 span {
    color: #38bdf8;
}

/* SUBTEXT */
.clan-subtitle {
    color: #94a3b8;
    margin-top: 8px;
    font-size: 15px;
}

/* GRID */
.clan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 35px;
}

/* CARD */
.clan-card {
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    font-family: 'Poppins', sans-serif;
}

.clan-card:hover {
    transform: translateY(-8px);
    background: #263548;
}

/* IMAGE */
.clan-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* TITLE */
.clan-card h3 {
    padding: 15px;
    font-size: 16px;
    font-weight: 500;
}

.clan-card.hidden {
    display: none;
}

@media (max-width: 768px) {
    .clan-container h1 { font-size: 28px; }
    .clan-container { padding: 30px 20px; }
}
</style>
