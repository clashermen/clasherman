<title>Clash of Clans Accounts</title>

<style>
/* PAGE */
.coc-container {
    padding: 40px 20px;
    text-align: center;
}

/* GRID */
.coc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

/* CARD */
.coc-card {
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.coc-card:hover {
    transform: translateY(-8px);
}

/* IMAGE */
.coc-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* TITLE */
.coc-card h3 {
    padding: 15px;
    font-size: 18px;
}
</style>

</head>
